<!DOCTYPE html>
<html>
<head>
    <title>My DOS Game</title>
    <link rel="stylesheet" href="https://js-dos.com">
    <script src="https://js-dos.com"></script>
    <style>
        #dos-container { width: 800px; height: 600px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="dos-container"></div>
    <script>
        // Replace 'your-game.zip' with the name of the zip you uploaded
        // Replace 'GAME.EXE' with the actual executable name inside the zip
        Dos(document.getElementById("dos-container")).run("your-game.zip", "GAME.EXE");
    </script>
</body>
</html>
